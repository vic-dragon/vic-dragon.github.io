- id: "imaging"
  number: "01"
  title: "Biomedical Imaging"
  title_em: "& Clinical AI"
  desc1: "We develop and evaluate statistical and AI-based methods for medical image analysis — spanning CT, MRI, fMRI, and DTI — with emphasis on rigorous validation and reproducibility of clinical AI systems."
  desc2: "Research areas include neuroimaging processing, pulmonary CT modeling, and fairness & reproducibility evaluation of deep learning diagnostics."
  tags:
    - "CT / MRI / fMRI"
    - "Neuroimaging"
    - "GLMM · GEE"
    - "DL Reproducibility"
    - "Survival Analysis"
  learn:
    - "Medical image data preprocessing & analysis"
    - "GLMM, GEE, Cox PH, competing risks"
    - "DL model evaluation & reproducibility"
    - "Neuroimaging analysis pipelines"
  collab: "Medical imaging data (CT/MRI/fMRI) and need rigorous statistical analysis, or AI diagnostic systems that need independent validation."

- id: "methods"
  number: "02"
  title: "Statistical"
  title_em: "Methodology Development"
  desc1: "We develop novel statistical methods for complex, real-world data and validate them through rigorous simulation and application. Current focus areas include uncertainty quantification and dynamic network inference."
  desc2: "Methods are developed for direct application: generalized fiducial inference for complex models, and dynamic network clustering for time-varying social, biological, and brain networks."
  tags:
    - "Fiducial Inference"
    - "Dynamic Networks"
    - "Brain Connectivity"
    - "Social Networks"
    - "R / Python Packages"
  learn:
    - "Statistical method development end-to-end"
    - "Network analysis & graph theory"
    - "R/Python package development"
    - "Simulation study design"
  collab: "Time-varying network data (social, biological, neural) or complex models where uncertainty quantification is challenging with existing methods."

- id: "epi"
  number: "03"
  title: "Population Health"
  title_em: "& Epidemiology"
  desc1: "Using large-scale population data including KNHANES, we investigate associations between dietary patterns, lifestyle factors, and chronic disease outcomes — with a focus on Korean food culture and public health."
  desc2: "We specialize in complex survey design analysis and appropriate statistical modeling for nationally representative epidemiological data."
  tags:
    - "KNHANES"
    - "Complex Survey Design"
    - "Nutritional Epidemiology"
    - "K-Food"
    - "GLM"
  learn:
    - "Complex survey data analysis"
    - "Large-scale public data (KNHANES, 건보)"
    - "Epidemiological study design"
    - "Logistic / Poisson regression, GLM"
  collab: "Public health or nutritional research questions using population-level data, or interests in Korean dietary patterns and chronic disease."
